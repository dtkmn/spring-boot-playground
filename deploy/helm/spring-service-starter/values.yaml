nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/example-org/example-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

management:
  port: 8081

env: {}

secrets:
  existingSecret: ""

serviceAccount:
  create: false
  name: ""
  annotations: {}

podAnnotations: {}
podSecurityContext: {}
containerSecurityContext: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: null

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: spring-service-starter.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

postgres:
  enabled: true
  host: postgresql.default.svc.cluster.local
  port: 5432
  database: app
