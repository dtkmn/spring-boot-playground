name: Starter Validation

on:
  push:
    branches: ["main", "dev"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: mvc-jpa
            artifact: demo-mvc-jpa
            package_name: tech.company.platform.demomvcjpa
          - variant: webflux-r2dbc
            artifact: demo-webflux-r2dbc
            package_name: tech.company.platform.demowebflux
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate starter
        run: |
          ./scripts/init-service.sh \
            --variant "${{ matrix.variant }}" \
            --service-name "${{ matrix.artifact }}" \
            --group-id tech.company.platform \
            --artifact-id "${{ matrix.artifact }}" \
            --package-name "${{ matrix.package_name }}"

      - name: Test generated starter
        run: ./gradlew -p "generated/${{ matrix.artifact }}" test --no-daemon

      - name: Build generated Docker image
        run: docker build -t "starter-${{ matrix.variant }}:ci" "generated/${{ matrix.artifact }}"

      - name: Validate generated Docker Compose
        run: |
          cp "generated/${{ matrix.artifact }}/.env.example" "generated/${{ matrix.artifact }}/.env"
          docker compose -f "generated/${{ matrix.artifact }}/docker-compose.yml" --env-file "generated/${{ matrix.artifact }}/.env" config

      - name: Check generated starter assets
        run: |
          test -f "generated/${{ matrix.artifact }}/README.md"
          test -f "generated/${{ matrix.artifact }}/.dockerignore"
          test -f "generated/${{ matrix.artifact }}/.gitignore"
          test -f "generated/${{ matrix.artifact }}/.github/workflows/ci.yml"
          test -f "generated/${{ matrix.artifact }}/.github/workflows/publish.yml"
          test -f "generated/${{ matrix.artifact }}/.github/dependabot.yaml"
          test -f "generated/${{ matrix.artifact }}/SUPPORT.md"
          test -f "generated/${{ matrix.artifact }}/CHANGELOG.md"
          test -f "generated/${{ matrix.artifact }}/deploy/helm/values-dev.yaml"
          test -d "generated/${{ matrix.artifact }}/deploy/helm/spring-service-starter"

      - name: Helm lint generated starter chart
        run: helm lint "generated/${{ matrix.artifact }}/deploy/helm/spring-service-starter"

      - name: Helm template generated starter chart
        run: |
          helm template "${{ matrix.artifact }}" "generated/${{ matrix.artifact }}/deploy/helm/spring-service-starter" \
            -f "generated/${{ matrix.artifact }}/deploy/helm/values-dev.yaml" \
            --set image.repository="ghcr.io/example/${{ matrix.artifact }}" \
            --set image.tag=test

  helm-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/spring-service-starter

      - name: Helm template
        run: |
          helm template starter deploy/helm/spring-service-starter \
            -f deploy/helm/spring-service-starter/values-dev.yaml \
            --set image.repository=ghcr.io/example/service \
            --set image.tag=test \
            --set secrets.existingSecret=starter-db \
            --set postgres.host=postgres.example.internal \
            --set postgres.database=starter
