name: Repository Validation

on:
  push:
    branches: ["main", "dev"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate repository root
        run: ./gradlew build --no-daemon

  example-builds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - kafka-basic
          - kafka-streams
          - binance-websocket
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build example
        run: ./gradlew -p "examples/${{ matrix.example }}" build --no-daemon

      - name: Build example Docker image
        run: docker build -t "example-${{ matrix.example }}:ci" "examples/${{ matrix.example }}"

      - name: Validate example Docker Compose
        run: |
          cp "examples/${{ matrix.example }}/.env.example" "examples/${{ matrix.example }}/.env"
          docker compose -f "examples/${{ matrix.example }}/docker-compose.yml" --env-file "examples/${{ matrix.example }}/.env" config
