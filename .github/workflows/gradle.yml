name: Repository Validation

permissions:
  contents: read

on:
  push:
    branches: ["main", "dev"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        project:
          - examples/kafka-basic
          - examples/kafka-streams
          - examples/binance-websocket
          - variants/mvc-jpa/template
          - variants/webflux-r2dbc/template
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle for dependency graph submission
        uses: gradle/actions/setup-gradle@v6
        with:
          dependency-graph: generate-and-submit
          dependency-graph-continue-on-failure: false
          dependency-graph-include-configurations: runtimeClasspath

      - name: Resolve runtime dependencies
        run: ./gradlew -p "${{ matrix.project }}" dependencies --configuration runtimeClasspath --no-daemon

  repository-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate repository root
        run: ./gradlew build --no-daemon

  example-builds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - kafka-basic
          - kafka-streams
          - binance-websocket
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build example
        run: ./gradlew -p "examples/${{ matrix.example }}" build --no-daemon

      - name: Build example Docker image
        run: docker build -t "example-${{ matrix.example }}:ci" "examples/${{ matrix.example }}"

      - name: Validate example Docker Compose
        run: |
          cp "examples/${{ matrix.example }}/.env.example" "examples/${{ matrix.example }}/.env"
          docker compose -f "examples/${{ matrix.example }}/docker-compose.yml" --env-file "examples/${{ matrix.example }}/.env" config
