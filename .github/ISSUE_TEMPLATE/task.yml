name: Task
description: Concrete implementation task for the Spring service starter
labels: ["kind:task"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - core
        - mvc
        - webflux
        - examples
        - dx
        - ci
        - docs
        - cloud
        - governance
    validations:
      required: true
  - type: textarea
    id: changes
    attributes:
      label: Implementation notes
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Tests or checks expected before closing the task.
