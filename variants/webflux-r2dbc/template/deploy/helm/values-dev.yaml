image:
  repository: ghcr.io/example-org/__ARTIFACT_ID__
  tag: dev

service:
  port: __APP_PORT__

management:
  port: __MANAGEMENT_PORT__

secrets:
  existingSecret: __ARTIFACT_ID__-db

postgres:
  enabled: true
  host: postgres.dev.svc.cluster.local
  port: 5432
  database: __ARTIFACT_ID__

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

ingress:
  enabled: false
