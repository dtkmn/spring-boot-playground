name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build Docker image
        run: docker build -t app:ci .

      - name: Validate Docker Compose
        run: |
          cp .env.example .env
          docker compose --env-file .env config

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/spring-service-starter

      - name: Helm template
        run: |
          helm template ${GITHUB_REPOSITORY##*/} deploy/helm/spring-service-starter \
            -f deploy/helm/values-dev.yaml \
            --set image.repository=ghcr.io/example/${GITHUB_REPOSITORY##*/} \
            --set image.tag=test
