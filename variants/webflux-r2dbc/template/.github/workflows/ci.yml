name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Validate Docker Compose
        run: |
          cp .env.example .env
          {
            echo "APP_HOST_PORT=18080"
            echo "MANAGEMENT_HOST_PORT=18081"
            echo "POSTGRES_EXPORT_PORT=15432"
          } >> .env
          docker compose -f compose.yaml --env-file .env config
          docker compose -f docker-compose.yml --env-file .env config

      - name: Smoke test bootRun development path
        run: ./scripts/dev-smoke-test.sh

      - name: Smoke test starter
        run: ./scripts/smoke-test.sh

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/spring-service-starter

      - name: Helm template
        run: |
          helm template ${GITHUB_REPOSITORY##*/} deploy/helm/spring-service-starter \
            -f deploy/helm/values-dev.yaml \
            --set image.repository=ghcr.io/example/${GITHUB_REPOSITORY##*/} \
            --set image.tag=test
