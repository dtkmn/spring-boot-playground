services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-__ARTIFACT_ID__}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - ${POSTGRES_EXPORT_PORT:-5432}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - ${APP_HOST_PORT:-8080}:__APP_PORT__
      - ${MANAGEMENT_HOST_PORT:-8081}:__MANAGEMENT_PORT__
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: __APP_PORT__
      MANAGEMENT_SERVER_PORT: __MANAGEMENT_PORT__
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-__ARTIFACT_ID__}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
