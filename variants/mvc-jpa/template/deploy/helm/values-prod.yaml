image:
  repository: ghcr.io/example-org/__ARTIFACT_ID__
  tag: prod

service:
  port: __APP_PORT__

management:
  port: __MANAGEMENT_PORT__

secrets:
  existingSecret: __ARTIFACT_ID__-db

postgres:
  enabled: true
  host: postgres.prod.svc.cluster.local
  port: 5432
  database: __ARTIFACT_ID__

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6

ingress:
  enabled: true
  hosts:
    - host: __ARTIFACT_ID__.prod.example.internal
      paths:
        - path: /
          pathType: Prefix
